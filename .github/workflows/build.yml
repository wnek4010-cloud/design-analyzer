name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: 분석 도구 빌드
        run: pyinstaller --onefile --windowed --name "설계분석도구" analyzer_gui.py

      - name: 설계문서 도구 빌드
        run: pyinstaller --onefile --windowed --name "설계문서생성도구" design_doc_gui.py

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE-v${{ github.run_number }}
          path: |
            dist/설계분석도구.exe
            dist/설계문서생성도구.exe
          retention-days: 30

      - name: Release 생성
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Design Tools v${{ github.run_number }}"
          overwrite_files: true
          body: |
            ## 설계 도구 모음
            - 설계분석도구.exe
            - 설계문서생성도구.exe
          files: |
            dist/설계분석도구.exe
            dist/설계문서생성도구.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
